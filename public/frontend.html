<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptStore | Aether Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            /* Base Theme (Daylight / SFW / Ghibli Nature) */
            --bg-base: #f0f7f4;
            --blob-1: #a7f3d0;
            --blob-2: #fde68a;
            --blob-3: #99f6e4;
            --panel-bg: rgba(255, 255, 255, 0.45);
            --panel-border: rgba(255, 255, 255, 0.7);
            --panel-shadow: rgba(0, 50, 20, 0.05);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #10b981;
            --accent-hover: #059669;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --accent-text: #ffffff;
        }

        body[data-mode="nsfw"] {
            /* Midnight Theme (Starlight / NSFW / Mystical Night) */
            --bg-base: #0f172a;
            --blob-1: #8b5cf6;
            --blob-2: #3b82f6;
            --blob-3: #ec4899;
            --panel-bg: rgba(15, 23, 42, 0.55);
            --panel-border: rgba(255, 255, 255, 0.1);
            --panel-shadow: rgba(0, 0, 0, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.5);
            --accent-text: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 1.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
            overflow-x: hidden;
            min-height: 100vh;
            margin: 0;
        }

        h1,
        h2,
        h3,
        .cinematic-text {
            font-family: 'Cinzel', serif;
        }

        /* Magical Blobs */
        .ambient-bg {
            position: fixed;
            inset: -20%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.6;
            animation: float 25s infinite ease-in-out alternate;
            transition: background 1.5s ease-in-out;
        }

        .blob-1 {
            top: 10%;
            left: 10%;
            width: 45vw;
            height: 45vw;
            background: var(--blob-1);
            animation-duration: 22s;
        }

        .blob-2 {
            bottom: 10%;
            right: 10%;
            width: 55vw;
            height: 55vw;
            background: var(--blob-2);
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%;
            left: 50%;
            width: 40vw;
            height: 40vw;
            background: var(--blob-3);
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(3%, 7%) scale(1.03);
            }

            100% {
                transform: translate(-3%, -4%) scale(0.97);
            }
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--panel-border);
            box-shadow: 0 20px 40px var(--panel-shadow);
            border-radius: 2rem;
            transition: all 0.5s ease;
        }

        .nav-pill {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
        }

        .nav-pill.active {
            color: var(--accent-text);
            background: var(--accent);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        input,
        select,
        textarea {
            background: var(--panel-bg) !important;
            border: 2px solid var(--panel-border) !important;
            color: var(--text-main) !important;
            border-radius: 1rem !important;
            transition: all 0.3s ease !important;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 4px var(--accent-glow) !important;
        }

        .btn-magic {
            background: var(--accent);
            color: var(--accent-text);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 1.25rem;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .btn-magic:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 15px 35px var(--accent-glow);
            transform: translateY(-4px) scale(1.02);
        }

        .art-frame {
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 4px solid var(--panel-bg);
            background: var(--panel-bg);
        }

        .art-frame:hover {
            border-color: var(--accent);
            box-shadow: 0 20px 40px var(--accent-glow);
            transform: translateY(-8px) scale(1.02);
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

            { "name": "Fur", "profile": "fur", "default_n_steps": 25, "default_guidance_scale": 4.5, "default_strength": 0.76, "default_negative_prompt": "human, multiple tails, old, oldest, cartoon, graphic, text, painting, crayon, graphite, abstract, glitch, deformed, mutated, ugly, disfigured, long body, lowres, bad anatomy, bad hands, missing fingers, extra digits, fewer digits, very displeasing, (worst" },
            { "name": "Noob", "profile": "noob", "default_n_steps": 32, "default_guidance_scale": 5, "default_strength": 0.76, "default_negative_prompt": "worst quality, old, early, low quality, lowres, signature, username, logo, bad hands, mutated hands, mammal, anthro, furry, ambiguous form, feral, semi-anthro" },
            { "name": "Aura", "profile": "aura", "default_n_steps": 36, "default_guidance_scale": 5, "default_strength": 0.76, "default_negative_prompt": "score_6, score_5, score_4, low res, huge breasts, mutated hands, bad hands, monochrome, grayscale, old, ugly, jewelry, accessory, bad eyes, bad face, muscular, chibi, buzzcut, watermark, logo" },
            { "name": "Pixel", "profile": "pixel", "default_n_steps": 26, "default_guidance_scale": 3.5, "default_strength": 0.76, "default_negative_prompt": "bad quality, worst quality, worst detail, copyright name, bad anatomy, watermark" },
            { "name": "Hyper CGI", "profile": "hypercgi", "default_n_steps": 25, "default_guidance_scale": 3, "default_strength": 0.76, "default_negative_prompt": "SmoothNegative_Hands-neg, Smooth Negative, modern, recent, old, oldest, cartoon, graphic, text, painting, crayon, graphite, abstract, glitch, deformed, mutated, ugly, disfigured, long body, lowres, bad anatomy, bad hands, missing fingers, extra fingers, e" },
            { "name": "Volt", "profile": "volt", "default_n_steps": 30, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "bad quality, poor quality, disfigured, jpg, toy, bad anatomy, missing limbs, missing fingers, ugly, scary, watermark" },
            { "name": "Muse", "profile": "muse", "default_n_steps": 28, "default_guidance_scale": 3, "default_strength": 0.76, "default_negative_prompt": "" },
            { "name": "Rend", "profile": "rend", "default_n_steps": 40, "default_guidance_scale": 6, "default_strength": 0.76, "default_negative_prompt": "worst_quality, bad_quality, poorly_detailed, long neck" },
            { "name": "Pony", "profile": "pony", "default_n_steps": 30, "default_guidance_scale": 6, "default_strength": 0.76, "default_negative_prompt": "score_6, score_5, score_4, nsfw, pumpkin, 3d, blurry, cropped, signature, username, watermark, jpeg artifacts, normal quality, worst quality, low quality, (missing fingers, extra digits, extra fingers, fewer digits, bad hands:1.3), bad eye,(deformed, dist" },
            { "name": "Neo", "profile": "neo", "default_n_steps": 35, "default_guidance_scale": 4, "default_strength": 0.76, "default_negative_prompt": "" },
            { "name": "Nai", "profile": "nai", "default_n_steps": 50, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "child, loli, young, source_furry, source_pony, monochrome, 3d, censored, (worst quality, low quality:1.4), (jpeg artifacts:1.4), negative_hand, negative_hand-neg, watermark, signature, text" },
            { "name": "Retro", "profile": "retro", "default_n_steps": 30, "default_guidance_scale": 5, "default_strength": 0.76, "default_negative_prompt": "worst quality, low quality, lowres, bad anatomy, bad hands, text, error, missing fingers, extra digits, fewer digits, cropped, jpeg artifacts, signature, watermark, username, blurry, artist name, old, early, lowres, logo, mutated hands, mammal, anthro, furry" },
            { "name": "Supra", "profile": "supra", "default_n_steps": 50, "default_guidance_scale": 2, "default_strength": 0.76, "default_negative_prompt": "(deformed iris, deformed pupils), worst quality, low quality, blurry, text" },
            { "name": "Evo", "profile": "evo", "default_n_steps": 40, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "(worst quality, low quality, illustration, 3d, 2d, painting, cartoons, sketch), open mouth, watermark)" },
            { "name": "Toon", "profile": "toon", "default_n_steps": 53, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "score_6, score_5, score_4, ugly face, mutated hands, ahegao, bad eyes, monochrome, sketch, ugly style" },
            { "name": "HyperX", "profile": "hyperx", "default_n_steps": 28, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "blur, bad quality, bad composition, copyright, watermark, lineart, pixelated, pixelated, painting, sketch" },
            { "name": "FurXL Classic", "profile": "furxl", "default_n_steps": 40, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "(worst quality, low quality), watermarks, signature, (interlocked fingers)" },
            { "name": "Illustrious", "profile": "illustrious", "default_n_steps": 53, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "bad quality, worst quality, worst detail, sketch, censor, signature, watermark, patreon username, patreon logo" },
            { "name": "Real Amateurs", "profile": "real_amateurs", "default_n_steps": 25, "default_guidance_scale": 3.5, "default_strength": 0.76, "default_negative_prompt": "asymmetrical-eyes, mismatched eyes, deformed eyes, (turkey-neck:1.2)" },
            { "name": "RealX", "profile": "realx", "default_n_steps": 30, "default_guidance_scale": 5, "default_strength": 0.76, "default_negative_prompt": "CyberRealistic_Negative_PONY_V2, watermark, logo, label" },
            { "name": "Real Classic", "profile": "realclassic", "default_n_steps": 28, "default_guidance_scale": 7, "default_strength": 0.76, "default_negative_prompt": "watermark, logomark, text, score 1, score 2, score 3, text, cartoon, anime, worst quality, low quality, bad anatomy, bad hands, bad eyes" }
        ];

        const state = {
            models: [], serverUrl: "", modelDefaults: null,
            history: JSON.parse(localStorage.getItem("aether_history") || "[]"),
            tasks: JSON.parse(localStorage.getItem("aether_tasks") || "[]"),
            activeMode: localStorage.getItem("aether_mode") || "standard",
            activeView: localStorage.getItem("aether_view") || "generate",
            lastModelByMode: JSON.parse(localStorage.getItem("aether_last_models") || "{}"),
        };

        const dom = {
            model: document.getElementById("model"), quality: document.getElementById("quality"), aspect: document.getElementById("aspect"),
            seed: document.getElementById("seed"), prompt: document.getElementById("prompt"), negativePrompt: document.getElementById("negativePrompt"),
            generateBtn: document.getElementById("generateBtn"), btnText: document.getElementById("btnText"), btnLoader: document.getElementById("btnLoader"),
            gallery: document.getElementById("gallery"), imageCount: document.getElementById("imageCount"), taskList: document.getElementById("taskList"),
            historyList: document.getElementById("historyList"), footerStatus: document.getElementById("footerStatus"),
            footerMsgText: document.getElementById("footerMsgText"), modal: document.getElementById("modal"), modalContainer: document.getElementById("modalContainer"),
            modalImage: document.getElementById("modalImage"), modalPrompt: document.getElementById("modalPrompt"), modalModel: document.getElementById("modalModel"),
            modalSeed: document.getElementById("modalSeed"), downloadImageBtn: document.getElementById("downloadImageBtn"),
        };

        function setFooterMsg(msg) {
            if (!dom.footerStatus) return;
            dom.footerMsgText.textContent = msg;
            dom.footerStatus.classList.remove("translate-y-20", "opacity-0");
            setTimeout(() => dom.footerStatus.classList.add("translate-y-20", "opacity-0"), 3000);
        }

        function getServerUrl() {
            const origin = window.location.origin;
            const std = (window.__SERVER_URL__ && !window.__SERVER_URL__.startsWith("__")) ? window.__SERVER_URL__ : origin;
            return (state.activeMode === "nsfw" ? (window.__SERVER_URL_NSFW__ && !window.__SERVER_URL_NSFW__.startsWith("__") ? window.__SERVER_URL_NSFW__ : std) : std).replace(/\/$/, "");
        }

        function persist() {
            localStorage.setItem("aether_history", JSON.stringify(state.history));
            localStorage.setItem("aether_tasks", JSON.stringify(state.tasks));
            localStorage.setItem("aether_mode", state.activeMode);
            localStorage.setItem("aether_view", state.activeView);
            localStorage.setItem("aether_last_models", JSON.stringify(state.lastModelByMode));
        }

        function setView(view) {
            state.activeView = view;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
            persist();
        }

        function applyMode(mode) {
            state.activeMode = mode;
            document.body.dataset.mode = mode;
            state.serverUrl = getServerUrl();
            const catalog = mode === 'nsfw' ? NSFW_MODELS : SFW_MODELS;
            state.models = catalog;
            dom.model.innerHTML = catalog.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            const last = state.lastModelByMode[mode];
            if (last && catalog.some(m => m.name === last)) dom.model.value = last;
            dom.quality.innerHTML = ['Fast', 'High Quality'].map(q => `<option value="${q}">${q}</option>`).join('');
            dom.aspect.innerHTML = ['1:1', '16:9', '5:2', '4:5', '4:7'].map(a => `<option value="${a}">${a}</option>`).join('');
            document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            loadDefaults(); renderArchive(); renderQueue(); persist();
            setFooterMsg(`Realm: ${mode.toUpperCase()}`);
        }

        function loadDefaults() {
            const model = state.models.find(m => m.name === dom.model.value);
            if (model) dom.negativePrompt.value = model.default_negative_prompt || "";
        }

        function openModal(item) {
            dom.modalImage.src = item.url;
            dom.modalPrompt.textContent = item.prompt;
            dom.modalModel.textContent = item.model;
            dom.modalSeed.textContent = item.seed || "Divine";
            dom.downloadImageBtn.href = item.url;
            dom.modal.classList.remove('hidden'); dom.modal.classList.add('flex');
            setTimeout(() => { dom.modal.classList.add('opacity-100'); dom.modalContainer.classList.remove('scale-95'); }, 10);
        }

        function closeModal() {
            dom.modal.classList.remove('opacity-100'); dom.modalContainer.classList.add('scale-95');
            setTimeout(() => { dom.modal.classList.add('hidden'); dom.modal.classList.remove('flex'); }, 500);
        }

        function renderArchive() {
            if (state.history.length === 0) { dom.historyList.innerHTML = `<div class="col-span-full py-20 text-center opacity-20 font-bold cinematic-text text-3xl">The Vault is empty</div>`; return; }
            dom.historyList.innerHTML = state.history.map(item => `
        <div class="art-frame cursor-pointer" onclick="openArchiveItem('${item.id}')">
          <div class="aspect-square relative"><img src="${item.image_urls[0]}" class="w-full h-full object-cover"></div>
          <div class="p-4 bg-white/5"><p class="text-[10px] font-bold uppercase text-[var(--accent)]">${item.model}</p></div>
        </div>
      `).join('');
        }

        function openArchiveItem(id) {
            const item = state.history.find(h => h.id === id);
            if (item) openModal({ ...item, url: item.image_urls[0] });
        }

        function renderQueue() {
            if (state.tasks.length === 0) { dom.taskList.innerHTML = `<div class="col-span-full py-20 text-center opacity-20 font-bold cinematic-text text-3xl">No active journeys</div>`; return; }
            dom.taskList.innerHTML = state.tasks.map(t => `
        <div class="p-6 glass-panel border-2 border-[var(--accent)] space-y-4">
          <div class="flex justify-between items-center"><span class="text-xs font-bold uppercase text-[var(--accent)]">${t.status}</span><span class="text-[10px] opacity-40">${t.created}</span></div>
          <p class="text-sm font-bold italic truncate">"${t.prompt}"</p>
        </div>
      `).join('');
        }

        document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));
        document.querySelectorAll('[data-mode]').forEach(b => b.addEventListener('click', () => applyMode(b.dataset.mode)));
        dom.model.addEventListener('change', () => { state.lastModelByMode[state.activeMode] = dom.model.value; loadDefaults(); persist(); });

        dom.generateBtn.addEventListener('click', async () => {
            const prompt = dom.prompt.value.trim();
            if (!prompt) { setFooterMsg("Inspiration required."); return; }
            const taskId = `v-${Date.now()}`;
            const payload = { model: dom.model.value, quality: dom.quality.value, aspect: dom.aspect.value, prompt, negative_prompt: dom.negativePrompt.value, seed: dom.seed.value ? Number(dom.seed.value) : null, nsfw: state.activeMode === 'nsfw' };
            state.tasks.unshift({ id: taskId, ...payload, status: 'weaving', created: new Date().toLocaleTimeString() });
            renderQueue();
            dom.generateBtn.disabled = true; dom.btnText.textContent = "Weaving..."; dom.btnLoader.classList.remove('hidden');
            try {
                const resp = await fetch(`${state.serverUrl}/generate`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!resp.ok) throw new Error();
                const res = await resp.json();
                state.tasks = state.tasks.filter(t => t.id !== taskId);
                state.history.unshift({ id: taskId, ...payload, image_urls: res.image_urls, created: new Date().toLocaleString() });
                dom.gallery.innerHTML = res.image_urls.map(url => `
          <div class="art-frame cursor-pointer" onclick="openModal({model:'${payload.model}', url:'${url}', prompt:'${prompt.replace(/'/g, "")}', seed:'${payload.seed || "Divine"}'})">
            <img src="${url}" class="w-full h-full object-cover">
          </div>
        `).join('');
                dom.imageCount.textContent = `${res.image_urls.length} Visions`;
                renderArchive(); renderQueue(); setFooterMsg("Vision complete.");
            } catch (e) { setFooterMsg("Weave unravelling."); state.tasks = state.tasks.filter(t => t.id !== taskId); renderQueue(); }
            finally { dom.generateBtn.disabled = false; dom.btnText.textContent = "Manifest Vision"; dom.btnLoader.classList.add('hidden'); persist(); }
        });

        applyMode(state.activeMode); setView(state.activeView);
        window.openArchiveItem = openArchiveItem; window.openModal = openModal; window.closeModal = closeModal;
    </script>
</body>

</html>
